<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirts</title>
  <style>
    body {
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
    }

    .shirt-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
      gap: 20px;
    }

    .shirt {
      max-width: 400px;
    }

    .shirt img {
      width: 100%;
    }

    .action-items {
      font-size: 18px;
    }
    .action-items button {
      background-color: #333;
      color: white;
      font-size: inherit;
      border-radius: 0px 8px 8px 0px;
      padding:4px 20px;
      cursor: pointer;
      border: none;
    }
    
    .action-items select {
      font-size: inherit;
      border-radius: 8px 0px 0px 8px;
      border: none;
      padding: 4px 30px;
    }

    .action-items option {
      border: none;
    }

    .shirt-stock.no-stock {
      color: red;
      font-weight: bold;
    }
  </style>

</head>
<body>
  <div id="root"></div>

      <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19",
          "react-dom/client": "https://esm.sh/react-dom@19/client",
          "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime"
        }
      }
      </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from "react";
      import ReactDOM from "react-dom/client";
      import tshirts from './t-shirts.js';
 

      const root = ReactDOM.createRoot(document.getElementById("root"));
      // Things for Leighton: Is the onClick for the button right nested inside an arrow function? How tf do I get the options to show the right amount - for loop doesn't work, neither does a template array. I've done it in the stupidest possible way, is this stupid???? Is the ternary the proper way add things? Local storage necessary? I know im not supposed to update the t-shirts file, but I added an export statement, was that how I was supposed to do that?

      // Each t-shirt should be displayed with the title, image, price, and the number of remaining stock. ✅

      // If the remaining stock is 0, then the term "Out of Stock" should be displayed.✅

      // A "buy" button and "quantity" select box should appear for those t-shirts with a stock above 0. ✅

      // The select box should allow the user to select the number of t-shirts to buy. The user should not be able to select more than the available stock. ✅

      // Clicking on the "buy" button should decrease the respective t-shirt's stock by the quantity selected.✅

      const Shirt = ({ shirt }) => {
        const [shirtStock, setShirtStock] = useState(shirt.stock);
        const [isStockAvailable, setStockAvailability] = useState(shirt.stock > 0);
        let quantitySelected = 1;

        let optionAmount = [];
        for(let i = 0; i < shirt.stock; i++) {
          optionAmount.push(i+1);
        }

        const buyHandler = (purchased) => {
            setShirtStock(shirt.stock -= purchased);
            if(shirt.stock > 0) {
              updateOptionAmount(shirt.stock);
            } else {
              setStockAvailability(false);
            }
        };

        useEffect(() => {
          setShirtStock(shirt.stock);
        }, [shirt.stock]);

        useEffect(() => {
          setStockAvailability(shirt.stock > 0);
        }, [isStockAvailable]);


        const updateOptionAmount = (remainingStock) => {
          optionAmount = optionAmount.slice(0, remainingStock);
          console.log(optionAmount);
        }
        
        // In the onClick for the button, I wrapped the function inside of an arrow function after reading this article from Medium by Fslunsky: https://medium.com/@fslunsky/reacts-event-handling-why-your-onclick-isn-t-clicking-1c136a0f3f7b  
        return (
            <div className="shirt">
              <img src={`images/${shirt.image}`} alt={shirt.title}/>
              <h3>{shirt.title}</h3>
              <p className="shirt-price">${shirt.price}</p>
              {isStockAvailable ? 
                <p className="shirt-stock">{shirt.stock} left!</p> 
                : <p className="shirt-stock no-stock">Out of Stock</p>
              }
              
              {isStockAvailable ?
                <div className="action-items">
                <select name="quantity" id="quantity" onChange={(e) => {quantitySelected = parseInt(e.target.value)}}>
                  {optionAmount.map((option) => <option value={option}>{option}</option>)}
                </select>

                
                <button type="button" onClick={() => buyHandler(quantitySelected)}>Buy</button>

              </div> : '' }
              
            </div>
        )
      }

      const App = () => {
        

        return (
          <>
            <h1>T-Shirts</h1>

            <div className="shirt-container">
                {tshirts.map(shirt => <Shirt shirt={shirt}/>)}
                
            </div>
          
          </>
        );
      };

      root.render(<App />);
    </script>
</body>
</html>
