<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirts</title>
  <style>
    body {
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
    }

    .shirt-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
      gap: 20px;
    }

    .shirt {
      max-width: 400px;
    }

    .shirt img {
      width: 100%;
    }

    .shirt .shirt-price {
      font-weight: bold;
    }
    .action-items {
      font-size: 18px;
    }
    .action-items button {
      background-color: #333;
      color: white;
      font-size: inherit;
      border-radius: 0px 8px 8px 0px;
      padding:4px 20px;
      cursor: pointer;
      border: none;
    }
    
    .action-items select {
      font-size: inherit;
      border-radius: 8px 0px 0px 8px;
      border: none;
      padding: 4px 30px;
    }

    .action-items option {
      border: none;
    }

    .shirt-stock.no-stock {
      color: red;
      font-weight: bold;
    }
  </style>

</head>
<body>
  <div id="root"></div>

      <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19",
          "react-dom/client": "https://esm.sh/react-dom@19/client",
          "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime"
        }
      }
      </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Adds the t-shirts.js data file to the document -->
    <script src="t-shirts.js"></script>
      
    <script type="text/babel" data-type="module">
      // imports React and sets up the root div 
      import React, { useState, useEffect } from "react";
      import ReactDOM from "react-dom/client";
      const root = ReactDOM.createRoot(document.getElementById("root"));

      

      const Shirt = ({ shirt }) => {
        // Sets default shirtStock state to shirt.stock. This will be updated throughout. Used let instead of const because the shirtStock amount changes throughout
        let [shirtStock, setShirtStock] = useState(shirt.stock);
        // Boolean for whether there is presently stock available, which gets updated once the shirtStock=0
        const [isStockAvailable, setStockAvailability] = useState(shirtStock > 0);

        // Creates the options for the dropdown. Starts with the spread operator and Array() method to create an array with a length equal to the shirt stock, then filling by using the keys() method, which gets the index of each slot. Since we need an array that will hold whole numbers going up to the amount of options, these index numbers are nearly what we need in this array. I split the map into two maps for readability. To get the numbers to begin at 1, we can map the array to add one to each number. Finally, we map the array to HTML tags using the map method, using the number for the value, key, and inner content of the tag. This will update with the useEffect for shirtStock, preventing the user from adding more shirts to cart than available stock. Then, within the actual return, it just calls this variable directly.
        const options = [ ...Array(shirtStock).keys()].map( i => ++i).map(num => (<option value={num} key={num}>{num}</option>));

        // Sets the default quantity of t-shirts to buy as 1. This will change when the user changes the select amount, which will then be used by the buyHandler
        const [quantitySelected, setSelectedQuantity] = useState(1);

        // Function to handle the buy button being click. It takes the number of purchased shirts as a parameter.
        const buyHandler = (purchased) => {
            // Sets the new stock as the current shirtStock minus the amount purchased.
            setShirtStock(shirtStock -= purchased);
            
            // If the new shirtStock is 0 (or less, just as a fallback if there is an error in the options menu that allows the user to buy more than the remaining stock)
            if(shirtStock <= 0) {
              // Set the new stock availability to false, which changes the text to say "Out of Stock." and removes the buy buttons.
              setStockAvailability(false);
            }
        };

        // Monitors the shirtStock value, and executes this code when any changes are made
        useEffect(() => {
          // Sets the shirtStock throughout the component.
          setShirtStock(shirtStock);
          // Resets the selected quantity to 1.
          setSelectedQuantity(1);
        }, [shirtStock]);

        // Returns the shirt component.
        // I used the ternary operator to conditionally render the shirt-stock paragraph, as well as the action-items div, according to whether stock is available or not.
        // For the select tag, I used the value onChange to update the quantitySelected value. It has to be parsed to an integer first however, to still be able to subtract from the remainingStock in the buyHandler
        // The buyHandler function was nested inside an arrow function to allow me to pass an parameter through it. I could have nested it in a function above, but given the basic nature of this application, I found it unnecessary. 
        return (
            <div className="shirt">
              <img src={`images/${shirt.image}`} alt={shirt.title}/>
              <h3>{shirt.title}</h3>
              <p className="shirt-price">${shirt.price}</p>
              {isStockAvailable ? 
                <p className="shirt-stock">{shirtStock} left!</p> 
                : <p className="shirt-stock no-stock">Out of Stock</p>
              }
              
              {isStockAvailable ?
                <div className="action-items">
                <select name="quantity" id="quantity" value={quantitySelected} onChange={(e) => {setSelectedQuantity(parseInt(e.target.value))}}>
                  {options}
                </select>

                
                <button type="button" onClick={() => buyHandler(quantitySelected)}>Buy</button>

                </div> : '' 
              }
              
            </div>
        )
      }

      const App = () => {
        // Adds the app inside of a React fragment to include an h1 without adding an additional unnecessary div. Inside the shirt-container div, I map each of the shirts in the t-shirts dataset to a <Shirt /> component.
        return (
          <>
            <h1>T-Shirts</h1>

            <div className="shirt-container">
                {tshirts.map(shirt => <Shirt shirt={shirt}/>)}
                
            </div>
          
          </>
        );
      };

      root.render(<App />);
    </script>
</body>
</html>
