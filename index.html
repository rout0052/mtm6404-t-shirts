<html lang="en">
<head>

  <title>T-Shirts</title>

    body {
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
    }

      flex-wrap: wrap;

    .shirt {

    .shirt img {
      width: 100%;
    }

    .action-items {

    }
    .action-items button {
      background-color: #333;
      color: white;
      font-size: inherit;
      border-radius: 0px 8px 8px 0px;
      padding: 4px 20px;
      border: none;
    }

    .action-items select {
      font-size: inherit;
      border-radius: 8px 0px 0px 8px;
      border: none;
      padding: 4px 30px;
    }

    .action-items option {
      border: none;
    }
  </style>

</head>
